<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success</title>

    <style>

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(90deg,#141e30,#243b55);
            font-family: Arial, sans-serif;
        }

        .box{
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0px 5px 20px black;
        }

        h1{
            color: green;
            margin-bottom: 25px;
            font-size: 35px;
        }

        a{
            text-decoration: none;
            background-color: black;
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 18px;
            transition: 0.3s;
        }

        a:hover{
            background-color: crimson;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1>Mail Sent Successfully ✅</h1>

        <a href="/aarthi/">⬅ Back</a>

    </div>

</body>
</html>
