<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Tower Security</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('https://digitalsecurityguard.com/wp-content/uploads/2019/07/virtual_security_guard_service.jpg');
            background-repeat: no-repeat;
            background-size: cover;
            font-family: Arial, sans-serif;
        }

        .container{
            width: 450px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0px 8px 25px rgba(0,0,0,0.5);
        }

        h2{
            text-align: center;
            margin-bottom: 15px;
            font-size: 38px;
            font-weight: 900;
            color: white;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 3px 3px 8px black;
        }

        h3{
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 28px;
        }

        label{
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        input{
            width: 100%;
            height: 45px;
            margin-top: 8px;
            margin-bottom: 20px;
            border: none;
            outline: none;
            border-radius: 30px;
            padding-left: 20px;
            font-size: 16px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        input:focus{
            border: 3px solid #ff512f;
        }

        button{
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(90deg, #ff512f, #dd2476);
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s;
        }

        button:hover{
            transform: scale(1.05);
        }

    </style>

</head>

<body>

    <div class="container">

        <h2>The Tower Security</h2>

        <h3>Employee Details</h3>

        <form method="POST">

            {% csrf_token %}

            <label>Name</label>
            <input type="text" name="name" placeholder="Enter Your Name">

            <label>Mobile Number</label>
            <input type="number" name="number" placeholder="Enter Your Number">

            <label>Email</label>
            <input type="email" name="email" placeholder="Enter Your Email">

            <label>Designation</label>
            <input type="text" name="designation" placeholder="Enter Your Designation">

            <button type="submit">Submit</button>

        </form>

    </div>

</body>
</html>
